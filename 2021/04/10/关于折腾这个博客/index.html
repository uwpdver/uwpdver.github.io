    <p><img src="http://ww1.sinaimg.cn/large/005tFoDsgy1gom4mh1bqvj308g05a3zo.jpg" alt="两只老虎爱跳舞"><br/><br>今天什么都没干，还浑身酸痛，折腾了一下午主题，找到一个很简单的主题，在添加分类和标签页面的时候，出现了问题，跳转到对应的路由时并没有渲染对应模板文件。这个主题的文档实在是太简陋了，只有寥寥几行安装步骤。hexo 官方的文档也很糟糕，没有找到什么有用的信息，所以干脆就舍弃掉了分类和标签页面。反正现在文章还不多，还没有索引的必要，把精力放在内容上面，锻炼写作表达能力，总结学习经验，体系化知识。才应该是我写博客的初心。</p>
